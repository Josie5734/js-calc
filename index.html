<!doctype html>
<html>
  <head>
    <title>JS-Calc</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Calculator</h1>

    <div class="calculator" id="calculator">
      <div class="display" id="display">
        <p></p>
      </div>

      <div class="buttons">
        <button type="button" class="c-btn double" data-value="clear">
          Clear
        </button>
        <button type="button" class="c-btn" data-value="backspace">Back</button>
        <button type="button" class="c-btn" data-value="/">÷</button>

        <button type="button" class="c-btn" data-value="7">7</button>
        <button type="button" class="c-btn" data-value="8">8</button>
        <button type="button" class="c-btn" data-value="9">9</button>
        <button type="button" class="c-btn" data-value="*">x</button>

        <button type="button" class="c-btn" data-value="4">4</button>
        <button type="button" class="c-btn" data-value="5">5</button>
        <button type="button" class="c-btn" data-value="6">6</button>
        <button type="button" class="c-btn" data-value="-">-</button>

        <button type="button" class="c-btn" data-value="1">1</button>
        <button type="button" class="c-btn" data-value="2">2</button>
        <button type="button" class="c-btn" data-value="3">3</button>
        <button type="button" class="c-btn" data-value="+">+</button>

        <button type="button" class="c-btn double" data-value="0">0</button>
        <button type="button" class="c-btn" data-value=".">.</button>
        <button type="button" class="c-btn" data-value="=">=</button>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
